        :root {

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-base);
            color: #f8fafc;
            /* Tactical grid background */

            min-height: 100vh;
        }

        .font-military {
            font-family: 'Black Ops One', cursive;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* Card Hover Effects */
        .vocab-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #334155;
        }
        .vocab-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.15);
        }

        /* Category Scrollbar Hiding */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Safe Area padding for iOS/Android bottom nav */
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 1rem); }
        .pt-safe { padding-top: calc(env(safe-area-inset-top) + 1rem); }

        // --------------------------------------------------------
        // TAB SWITCHING LOGIC
        // --------------------------------------------------------
        function switchTab(tabName) {
            // Hide all pages
            document.getElementById('page-vocab').classList.add('hidden');
            document.getElementById('page-translate').classList.add('hidden');
            
            // Show target page
            document.getElementById(`page-${tabName}`).classList.remove('hidden');

            // Reset Nav Button Styles
            const btnVocab = document.getElementById('tab-btn-vocab');
            const iconVocab = document.getElementById('tab-icon-vocab');
            const btnTranslate = document.getElementById('tab-btn-translate');
            const iconTranslate = document.getElementById('tab-icon-translate');

            btnVocab.classList.replace('text-emerald-500', 'text-slate-500');
            iconVocab.classList.replace('ph-fill', 'ph-regular');
            
            btnTranslate.classList.replace('text-emerald-500', 'text-slate-500');
            iconTranslate.classList.replace('ph-fill', 'ph-regular');

            // Set Active Tab Styles
            if(tabName === 'vocab') {
                btnVocab.classList.replace('text-slate-500', 'text-emerald-500');
                iconVocab.classList.replace('ph-regular', 'ph-fill');
            } else {
                btnTranslate.classList.replace('text-slate-500', 'text-emerald-500');
                iconTranslate.classList.replace('ph-regular', 'ph-fill');
                
                // Focus the quick search input automatically
                setTimeout(() => document.getElementById('quick-translate-input').focus(), 50);
            }
        }

        // --------------------------------------------------------
        // TAB 1: VOCAB GRID LOGIC
        // --------------------------------------------------------
        let activeCategory = 'All';
        let searchQuery = '';

        const gridEl = document.getElementById('vocab-grid');
        const noResultsEl = document.getElementById('no-results');
        const searchInput = document.getElementById('searchInput');

        const getPopularCategories = () => {
            const counts = {};
            vocabularyData.forEach(item => counts[item.cat] = (counts[item.cat] || 0) + 1);
            // โชว์หมวดหมู่ที่มีคำศัพท์ 4 คำขึ้นไป + หมวดหลักๆ
            return Object.keys(counts)
                .filter(cat => counts[cat] >= 4 || ['Weapon', 'Unit', 'Tactics', 'Rank', 'Slang', 'Comms'].includes(cat))
                .sort((a,b) => counts[b] - counts[a]);
        };

        function initApp() {
            document.getElementById('total-count').textContent = vocabularyData.length;
            document.getElementById('translate-count-badge').textContent = vocabularyData.length;
            
            const filterContainer = document.getElementById('category-filters');
            const topCats = getPopularCategories();
            
            topCats.forEach(cat => {
                const btn = document.createElement('button');
                btn.textContent = cat.toUpperCase();
                btn.className = `cat-btn px-5 py-2 rounded-xl text-sm font-bold tracking-wider font-mono whitespace-nowrap bg-slate-800 text-slate-400 border border-slate-700 hover:bg-slate-700 transition-all`;
                btn.onclick = () => filterCategory(cat, btn);
                filterContainer.appendChild(btn);
            });

            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderCards();
            });

            // Quick Translate Listener
            document.getElementById('quick-translate-input').addEventListener('input', handleQuickTranslate);

            if ('speechSynthesis' in window) {
                window.speechSynthesis.getVoices();
                window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
            }

            renderCards();
        }

        function filterCategory(cat, btnElement = null) {
            activeCategory = cat;
            
            const allBtns = document.querySelectorAll('.cat-btn');
            allBtns.forEach(b => {
                b.classList.remove('bg-emerald-600', 'text-white', 'border-emerald-500', 'shadow-lg');
                b.classList.add('bg-slate-800', 'text-slate-400', 'border-slate-700');
            });

            if (btnElement) {
                btnElement.classList.remove('bg-slate-800', 'text-slate-400', 'border-slate-700');
                btnElement.classList.add('bg-emerald-600', 'text-white', 'border-emerald-500', 'shadow-lg');
            } else {
                allBtns[0].classList.remove('bg-slate-800', 'text-slate-400', 'border-slate-700');
                allBtns[0].classList.add('bg-emerald-600', 'text-white', 'border-emerald-500', 'shadow-lg');
            }

            renderCards();
        }

        function renderCards() {
            gridEl.innerHTML = '';
            
            const filtered = vocabularyData.filter(item => {
                const matchesCat = activeCategory === 'All' || item.cat === activeCategory;
                const matchesSearch = item.en.toLowerCase().includes(searchQuery) || 
                                      item.th.includes(searchQuery) || 
                                      item.ipa.includes(searchQuery);
                return matchesCat && matchesSearch;
            });

            if (filtered.length === 0) {
                noResultsEl.classList.remove('hidden');
                gridEl.classList.add('hidden');
            } else {
                noResultsEl.classList.add('hidden');
                gridEl.classList.remove('hidden');
                
                filtered.forEach(item => {
                    const safeWord = item.en.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    
                    const card = document.createElement('div');
                    card.className = "vocab-card bg-slate-800/80 backdrop-blur-sm rounded-[1.5rem] p-5 flex flex-col justify-between h-full relative group";
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="inline-block px-2 py-1 bg-slate-700 text-emerald-400 text-[10px] font-bold font-mono rounded uppercase tracking-widest mb-2 border border-slate-600">
                                    [ ${item.cat} ]
                                </span>
                                <h3 class="text-2xl font-bold text-white mb-1 group-hover:text-emerald-400 transition-colors">${item.en}</h3>
                                <p class="text-slate-400 font-mono text-sm italic">${item.ipa}</p>
                            </div>
                            <button onclick="speak('${safeWord}', this)" class="w-12 h-12 rounded-xl bg-slate-700 text-slate-300 flex items-center justify-center hover:bg-emerald-500 hover:text-white hover:shadow-lg hover:shadow-emerald-500/30 transition-all active:scale-95 shrink-0" title="Listen">
                                <i class="ph-fill ph-speaker-high text-2xl pointer-events-none"></i>
                            </button>
                        </div>
                        <div class="pt-4 border-t border-slate-700 mt-auto">
                            <p class="text-slate-200 text-lg">${item.th}</p>
                        </div>
                    `;
                    gridEl.appendChild(card);
                });
            }
        }

        // --------------------------------------------------------
        // TAB 2: QUICK TRANSLATE LOGIC
        // --------------------------------------------------------
        function handleQuickTranslate(e) {
            const query = e.target.value.toLowerCase().trim();
            const resultsContainer = document.getElementById('quick-translate-results');
            
            if (!query) {
                resultsContainer.innerHTML = `
                    <div class="text-center py-16 text-slate-500 flex flex-col items-center justify-center h-full">
                        <i class="ph-duotone ph-keyboard text-6xl mb-4 opacity-50"></i>
                        <p class="text-lg">พิมพ์คำศัพท์ด้านบนเพื่อเริ่มแปลทันที</p>
                    </div>`;
                return;
            }

            // ค้นหาศัพท์ที่ตรงกัน (ขยายลิมิตให้แสดงได้ถึง 15 คำ)
            const results = vocabularyData.filter(item => 
                item.en.toLowerCase().includes(query) || 
                item.th.includes(query)
            ).slice(0, 15);

            if (results.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="text-center py-12 text-rose-400/80">
                        <i class="ph-duotone ph-warning-circle text-5xl mb-3 block"></i>
                        <p class="text-lg">ไม่พบคำศัพท์นี้ในฐานข้อมูล</p>
                    </div>`;
                return;
            }

            resultsContainer.innerHTML = results.map(item => {
                const safeWord = item.en.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                return `
                    <div class="bg-slate-900 border border-slate-700 p-4 rounded-2xl flex justify-between items-center gap-4 hover:border-emerald-500 transition-colors">
                        <div>
                            <h4 class="text-white font-bold text-xl leading-tight mb-1">${item.en}</h4>
                            <p class="text-emerald-400 font-mono text-base">${item.th}</p>
                        </div>
                        <button onclick="speak('${safeWord}', this)" class="w-12 h-12 rounded-xl bg-slate-800 border border-slate-700 text-slate-300 flex items-center justify-center hover:bg-emerald-500 hover:text-white hover:border-emerald-500 transition-all active:scale-95 shrink-0">
                            <i class="ph-fill ph-speaker-high text-xl pointer-events-none"></i>
                        </button>
                    </div>
                `;
            }).join('');
        }

        function clearQuickSearch() {
            const input = document.getElementById('quick-translate-input');
            input.value = '';
            input.focus();
            handleQuickTranslate({ target: { value: '' } });
        }

        // --------------------------------------------------------
        // AUDIO SYSTEM (Hybrid Native & Google TTS)
        // --------------------------------------------------------
        window.currentAudio = null;
        window.currentUtterance = null;

        function speak(text, btnElement) {
            let icon = null;
            let originalClass = "ph-fill ph-speaker-high text-xl pointer-events-none"; // fallback default
            
            if (btnElement) {
                icon = btnElement.querySelector('i');
                if (icon) {
                    originalClass = icon.className;
                    icon.className = 'ph-fill ph-speaker-high text-white animate-pulse pointer-events-none ' + (originalClass.includes('text-2xl') ? 'text-2xl' : 'text-xl');
                    
                    // ปรับสีปุ่มให้สว่างขึ้นตอนกด
                    btnElement.classList.add('bg-emerald-500', 'text-white', 'shadow-lg', 'shadow-emerald-500/50');
                    btnElement.classList.remove('bg-slate-700', 'bg-slate-800', 'text-slate-300');
                }
            }

            const resetIcon = () => {
                if (icon && btnElement) {
                    icon.className = originalClass;
                    btnElement.classList.remove('bg-emerald-500', 'text-white', 'shadow-lg', 'shadow-emerald-500/50');
                    // คืนค่าสีเดิมของปุ่ม (ขึ้นอยู่กับว่ามาจากหน้า Grid หรือหน้า Quick Search)
                    if (btnElement.classList.contains('border-slate-700')) {
                        btnElement.classList.add('bg-slate-800', 'text-slate-300');
                    } else {
                        btnElement.classList.add('bg-slate-700', 'text-slate-300');
                    }
                }
            };

            const playFallbackOnlineTTS = () => {
                if (window.currentAudio) {
                    window.currentAudio.pause();
                    window.currentAudio.currentTime = 0;
                }
                const url = `https://translate.googleapis.com/translate_tts?client=gtx&ie=UTF-8&tl=en-US&q=${encodeURIComponent(text)}`;
                window.currentAudio = new Audio(url);
                window.currentAudio.crossOrigin = "anonymous";
                window.currentAudio.onended = resetIcon;
                window.currentAudio.onerror = resetIcon;
                window.currentAudio.play().catch(err => {
                    console.error("Fallback TTS failed:", err);
                    resetIcon();
                });
            };

            const isWebView = /Line|FBAN|FBAV|Instagram/i.test(navigator.userAgent);

            if ('speechSynthesis' in window && !isWebView) {
                if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
                    window.speechSynthesis.cancel();
                }
                
                window.currentUtterance = new SpeechSynthesisUtterance(text);
                window.currentUtterance.lang = 'en-US'; 
                window.currentUtterance.rate = 0.85;

                window.currentUtterance.onend = resetIcon;
                window.currentUtterance.onerror = (e) => {
                    console.warn("Native TTS Error, switching to Fallback...", e);
                    playFallbackOnlineTTS();
                };

                window.speechSynthesis.speak(window.currentUtterance);
                
                setTimeout(() => {
                    if (!window.speechSynthesis.speaking && !window.speechSynthesis.pending) {
                        playFallbackOnlineTTS();
                    }
                }, 100);
            } else {
                playFallbackOnlineTTS();
            }
        }

        // Boot App
        window.onload = initApp;

    </script>
</body>
</html>
